# Pure black/white, no tinted accent - background/foreground/cursor/
# selection/accent are all black, white, or gray. The ANSI colors (1-6,
# 9-14) keep muted versions of their usual hues so terminal output that
# depends on color (git diffs, ls, syntax highlighting) stays legible
# instead of turning fully grayscale - that's the only color left in.
accent = "#ffffff"
cursor = "#ffffff"
foreground = "#ffffff"
background = "#000000"
selection_foreground = "#000000"
selection_background = "#ffffff"

color0 = "#000000"
color1 = "#e06c75"
color2 = "#98c379"
color3 = "#e5c07b"
color4 = "#7dc1ff"
color5 = "#c678dd"
color6 = "#56b6c2"
color7 = "#d0d0d0"
color8 = "#4d4d4d"
color9 = "#ff8a94"
color10 = "#b5e08c"
color11 = "#f0d08a"
color12 = "#7dc1ff"
color13 = "#d9a6f0"
color14 = "#7fd4e0"
color15 = "#ffffff"
