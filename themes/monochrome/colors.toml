# Pure black/white base (background, foreground, cursor, selection) - no
# tinted grays. The ANSI colors (1-6, 9-14) keep muted versions of their
# usual hues so terminal output that depends on color (git diffs, ls,
# syntax highlighting) stays legible instead of turning fully grayscale.
# The single spot of real color allowed to "pop" is accent/selection - a
# cool blue, used sparingly for highlights (selected menu item, notification
# border, cursor... actually cursor stays white for max legibility).
accent = "#4da6ff"
cursor = "#ffffff"
foreground = "#ffffff"
background = "#000000"
selection_foreground = "#000000"
selection_background = "#4da6ff"

color0 = "#000000"
color1 = "#e06c75"
color2 = "#98c379"
color3 = "#e5c07b"
color4 = "#4da6ff"
color5 = "#c678dd"
color6 = "#56b6c2"
color7 = "#d0d0d0"
color8 = "#4d4d4d"
color9 = "#ff8a94"
color10 = "#b5e08c"
color11 = "#f0d08a"
color12 = "#7dc1ff"
color13 = "#d9a6f0"
color14 = "#7fd4e0"
color15 = "#ffffff"
